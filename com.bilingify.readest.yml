id: com.bilingify.readest

runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk

command: readest.sh
rename-desktop-file: Readest.desktop
rename-icon: readest

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --share=ipc
  - --share=network

modules:
  - name: readest
    buildsystem: simple
    sources:
      - type: file
        url: https://github.com/readest/readest/releases/download/v0.11.4/Readest_0.11.4_amd64.deb
        sha256: 3b013d21388d3bb714d44334713242b3718c71ef5786139e932c33fd8ccbb88d
        only-arches: [x86_64]
        dest-filename: Readest.deb
      - type: file
        url: https://github.com/readest/readest/releases/download/v0.11.4/Readest_0.11.4_arm64.deb
        sha256: ef88b6d33d0c8edbad90e4b0776831a5b272cc7c6c403039aef7ed972e4d3960
        only-arches: [aarch64]
        dest-filename: Readest.deb
      - type: file
        url: https://raw.githubusercontent.com/readest/readest/35eb7f2e14ea52f15b76ae673cc7b59a0922a5f6/data/metainfo/appdata.xml
        sha256: 471ca9ef03efcf3746efac542c22f8c3a6735e6328c4fb70420a095706abc143
        dest-filename: com.bilingify.readest.metainfo.xml
      - type: script
        dest-filename: readest.sh
        commands:
          - |
            export WEBKIT_DISABLE_DMABUF_RENDERER=1
            export READEST_DISABLE_UPDATER=1

            exec /app/bin/readest "$@"

    build-commands:
      - ar -x Readest.deb
      - tar -xf data.tar.gz
      - install -Dm755 readest.sh -t /app/bin
      - install -Dm755 usr/bin/readest -t /app/bin
      - install -Dm644 usr/share/applications/Readest.desktop -t /app/share/applications
      - mv usr/share/icons /app/share
      - install -Dm644 com.bilingify.readest.metainfo.xml -t /app/share/metainfo
      - desktop-file-edit --set-key=Exec --set-value='readest.sh %u' /app/share/applications/Readest.desktop
